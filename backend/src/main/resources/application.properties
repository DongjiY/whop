spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/whop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:whop}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:whop}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
