services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=whop
      - POSTGRES_USER=whop
      - POSTGRES_PASSWORD=whop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whop -d whop"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/whop
      - SPRING_DATASOURCE_USERNAME=whop
      - SPRING_DATASOURCE_PASSWORD=whop
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
